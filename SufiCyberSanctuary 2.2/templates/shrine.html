<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>慧忍神宮 | Inner Shrine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        /* --- 神宮标题呼吸发光效果 --- */
        h2 {
            animation: shrineTitleBreath 4s ease-in-out infinite;
        }

        @keyframes shrineTitleBreath {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255,255,255,0.5),
                             0 0 20px rgba(255,255,255,0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(255,255,255,0.9),
                             0 0 40px rgba(255,255,255,0.5),
                             0 0 60px rgba(255,255,255,0.3);
            }
        }

        /* --- 副标题呼吸效果 --- */
        p[style*="color: #666"] {
            animation: subtitleBreath 3s ease-in-out infinite;
        }

        @keyframes subtitleBreath {
            0%, 100% {
                opacity: 0.5;
                text-shadow: 0 0 5px rgba(102,102,102,0.3);
            }
            50% {
                opacity: 0.8;
                text-shadow: 0 0 15px rgba(102,102,102,0.6);
            }
        }

        /* --- 输入框聚焦时的呼吸光晕 --- */
        input:focus {
            border-bottom-color: #FFFFFF !important;
            box-shadow: 0 2px 10px rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        /* --- 按钮呼吸灯效果 --- */
        button[type="submit"] {
            animation: buttonBreath 3s ease-in-out infinite;
        }

        @keyframes buttonBreath {
            0%, 100% {
                box-shadow: 0 0 5px rgba(255,255,255,0.2);
            }
            50% {
                box-shadow: 0 0 15px rgba(255,255,255,0.5),
                            0 0 25px rgba(255,255,255,0.3);
            }
        }

        /* --- 返回链接呼吸效果 --- */
        a[href="/"] {
            animation: linkBreath 3s ease-in-out infinite;
        }

        @keyframes linkBreath {
            0%, 100% {
                opacity: 0.4;
            }
            50% {
                opacity: 0.7;
                text-shadow: 0 0 10px rgba(68,68,68,0.5);
            }
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <!-- 完全保留你原来的标题，无任何改动 -->
        <h2 style="letter-spacing: 15px; font-size: 2rem;">慧忍神宮</h2>
        <p style="color: #666; margin-top: 10px;">INNER SHRINE OF WISDOM</p>

        <!-- 完整表单，仅新增内容，原有样式完全保留 -->
        <form id="messageForm">
            <!-- 新增：姓名输入框，样式和原有输入框完全统一 -->
            <input type="text"
                   name="user_name"
                   id="userName"
                   style="background: transparent; border: none; border-bottom: 1px solid #FFFFFF; color: #FFFFFF; font-size: 1.2rem; width: 400px; text-align: center; margin-top: 40px; outline: none;"
                   placeholder="（您的稱呼，不填則為匿名信眾）"
                   autocomplete="off">

            <!-- 完全保留你原来的留言输入框，样式、文字、位置无任何改动 -->
            <input type="text"
                   name="message_content"
                   id="messageContent"
                   style="background: transparent; border: none; border-bottom: 1px solid #FFFFFF; color: #FFFFFF; font-size: 1.5rem; width: 400px; text-align: center; margin-top: 30px; outline: none;"
                   placeholder="（在此述說您的苦難...）"
                   autocomplete="off"
                   required>

            <!-- 新增：呈上按钮，完全贴合原有极简风格，无多余设计 -->
            <button type="submit"
                    id="submitBtn"
                    style="background: transparent; border: 1px solid #FFFFFF; color: #FFFFFF; font-size: 1rem; padding: 8px 30px; margin-top: 50px; cursor: pointer; letter-spacing: 8px; transition: all 0.3s ease;"
                    onmouseover="this.style.background='#FFFFFF'; this.style.color='#000000';"
                    onmouseout="this.style.background='transparent'; this.style.color='#FFFFFF';">
                呈 上
            </button>
        </form>

        <!-- 邮箱订阅区域 -->
        <div style="margin-top: 60px; padding-top: 40px; border-top: 1px solid #333;">
            <p style="color: #888; font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 20px;">訂閱神宮慧音</p>

            <div style="display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px;">
                <label style="color: #AAA; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox"
                           id="subscribeCheck"
                           style="width: 16px; height: 16px; cursor: pointer; accent-color: #FFFFFF;">
                    <span>免費訂閱神宮更新</span>
                </label>
            </div>

            <div id="emailInputContainer" style="display: none; margin-top: 15px;">
                <input type="email"
                       id="subscriberEmail"
                       style="background: transparent; border: none; border-bottom: 1px solid #666; color: #FFFFFF; font-size: 1rem; width: 300px; text-align: center; outline: none; padding: 5px 0;"
                       placeholder="請輸入您的郵箱地址"
                       autocomplete="email">

                <button type="button"
                        id="subscribeBtn"
                        style="background: transparent; border: 1px solid #666; color: #AAAAAA; font-size: 0.9rem; padding: 6px 25px; margin-top: 20px; cursor: pointer; letter-spacing: 5px; transition: all 0.3s ease;"
                        onmouseover="this.style.borderColor='#FFFFFF'; this.style.color='#FFFFFF';"
                        onmouseout="this.style.borderColor='#666'; this.style.color='#AAAAAA';">
                    訂 閱
                </button>
            </div>
        </div>

        <a href="/" style="margin-top: 100px; display: block; color: #444; text-decoration: none;">← 返回虛空 / RETURN TO VOID</a>
    </div>

    <script>
        // 订阅复选框控制邮箱输入框显示/隐藏
        document.getElementById('subscribeCheck').addEventListener('change', function() {
            const emailContainer = document.getElementById('emailInputContainer');
            if (this.checked) {
                emailContainer.style.display = 'block';
                emailContainer.style.animation = 'fadeIn 0.5s ease-in';
            } else {
                emailContainer.style.display = 'none';
            }
        });

        // 订阅按钮点击事件
        document.getElementById('subscribeBtn').addEventListener('click', async function() {
            const email = document.getElementById('subscriberEmail').value.trim();
            const subscribeBtn = document.getElementById('subscribeBtn');

            if (!email) {
                alert('請輸入郵箱地址');
                return;
            }

            // 简单的邮箱格式验证
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('請輸入有效的郵箱地址');
                return;
            }

            subscribeBtn.disabled = true;
            subscribeBtn.innerText = '處 理 中...';

            try {
                const res = await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });

                const result = await res.json();

                if (res.ok) {
                    alert(result.message || '訂閱成功！感謝您的支持。');
                    document.getElementById('subscriberEmail').value = '';
                    document.getElementById('subscribeCheck').checked = false;
                    document.getElementById('emailInputContainer').style.display = 'none';
                } else {
                    alert(result.error || '訂閱失敗，請稍後再試');
                }
            } catch (error) {
                console.error('訂閱錯誤:', error);
                alert('網路異常，請稍後再試');
            } finally {
                subscribeBtn.disabled = false;
                subscribeBtn.innerText = '訂 閱';
            }
        });

        document.getElementById('messageForm').onsubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const nameInput = document.getElementById('userName');
            const contentInput = document.getElementById('messageContent');

            submitBtn.disabled = true;
            submitBtn.innerText = '傳 送 中...';

            try {
                const res = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nameInput.value.trim() || '匿名信眾',
                        content: contentInput.value.trim()
                    })
                });

                const result = await res.json();
                alert(result.message || result.error);
                if (res.ok) {
                    nameInput.value = '';
                    contentInput.value = '';
                }
            } catch (error) {
                console.error('提交錯誤:', error);
                alert('網路異常，請稍後再試');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '呈 上';
            }
        };
    </script>
</body>
</html>
