<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>靜心儀式 | Meditation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .meditation-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .duration-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .duration-option {
            background: transparent;
            border: 1px solid #666;
            color: #AAAAAA;
            padding: 12px 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            font-size: 1rem;
        }

        .duration-option:hover {
            border-color: #FFFFFF;
            color: #FFFFFF;
        }

        .duration-option.selected {
            border-color: #FFFFFF;
            color: #FFFFFF;
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .meditation-message {
            font-size: 1.2rem;
            color: #AAAAAA;
            margin-bottom: 40px;
            letter-spacing: 3px;
            text-align: center;
            min-height: 30px;
        }

        .breathing-light {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            margin: 40px 0;
            display: none;
        }

        .breathing-light.active {
            display: block;
            animation: breathe 6s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% {
                opacity: 0.3;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .countdown-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 30px 0;
            letter-spacing: 5px;
            display: none;
        }

        .countdown-display.active {
            display: block;
        }

        .control-buttons {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        .control-btn {
            background: transparent;
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.2rem;
            padding: 12px 40px;
            cursor: pointer;
            letter-spacing: 5px;
            transition: all 0.3s ease;
        }

        .control-btn:hover:not(:disabled) {
            background: #FFFFFF;
            color: #000000;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-links {
            margin-top: 60px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-link {
            color: #AAAAAA;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #444;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .nav-link:hover {
            color: #FFFFFF;
            border-color: #FFFFFF;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .page-title {
            letter-spacing: 10px;
            font-size: 2rem;
            margin-bottom: 10px;
            animation: shrineTitleBreath 4s ease-in-out infinite;
        }

        .page-subtitle {
            color: #666;
            margin-bottom: 40px;
            letter-spacing: 5px;
        }

        @keyframes shrineTitleBreath {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255,255,255,0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(255,255,255,0.9),
                             0 0 40px rgba(255,255,255,0.5);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="meditation-container">
        <h2 class="page-title">靜心儀式</h2>
        <p class="page-subtitle">MEDITATION CEREMONY</p>

        <div class="meditation-message" id="messageText">深呼吸，放下雜念，靜享片刻安寧</div>

        <div class="duration-selector" id="durationSelector">
            <button class="duration-option" data-duration="3">3分鐘</button>
            <button class="duration-option" data-duration="5">5分鐘</button>
            <button class="duration-option" data-duration="10">10分鐘</button>
            <button class="duration-option" data-duration="15">15分鐘</button>
        </div>

        <div class="breathing-light" id="breathingLight"></div>

        <div class="countdown-display" id="countdownDisplay">00:00</div>

        <div class="control-buttons">
            <button id="startBtn" class="control-btn" disabled>開始靜心</button>
            <button id="endBtn" class="control-btn" style="display: none;">提前結束</button>
        </div>

        <div class="nav-links">
            <a href="/daily-prayer" class="nav-link">每日祈願</a>
            <a href="/daily-checkin" class="nav-link">每日簽到</a>
            <a href="/profile" class="nav-link">用戶中心</a>
            <a href="/shrine" class="nav-link">返回神宮</a>
        </div>
    </div>

    <script>
        let selectedDuration = null;
        let countdownInterval = null;
        let remainingSeconds = 0;

        // 选择时长
        document.querySelectorAll('.duration-option').forEach(btn => {
            btn.addEventListener('click', function() {
                if (countdownInterval) return; // 进行中不能修改
                
                document.querySelectorAll('.duration-option').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedDuration = parseInt(this.dataset.duration);
                document.getElementById('startBtn').disabled = false;
            });
        });

        // 开始静心
        document.getElementById('startBtn').addEventListener('click', async function() {
            if (!selectedDuration) return;

            try {
                const res = await fetch('/api/meditation/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duration: selectedDuration })
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || '靜心啟動失敗');
                    return;
                }

                // 隐藏选择器，显示呼吸灯和倒计时
                document.getElementById('durationSelector').style.display = 'none';
                document.getElementById('breathingLight').classList.add('active');
                document.getElementById('countdownDisplay').classList.add('active');
                document.getElementById('messageText').innerText = '靜心進行中...';
                
                this.style.display = 'none';
                document.getElementById('endBtn').style.display = 'block';

                // 开始倒计时
                remainingSeconds = selectedDuration * 60;
                updateCountdown();
                
                countdownInterval = setInterval(() => {
                    remainingSeconds--;
                    updateCountdown();

                    if (remainingSeconds <= 0) {
                        completeMeditation();
                    }
                }, 1000);

            } catch (error) {
                console.error('靜心錯誤:', error);
                alert('網路異常，請稍後再試');
            }
        });

        // 提前结束
        document.getElementById('endBtn').addEventListener('click', async function() {
            if (confirm('確認提前結束靜心？本次靜心將不計入時長')) {
                clearInterval(countdownInterval);
                countdownInterval = null;

                await fetch('/api/meditation/cancel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                alert('本次靜心未完成，不計入時長哦');
                resetMeditation();
            }
        });

        function updateCountdown() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            document.getElementById('countdownDisplay').innerText = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        async function completeMeditation() {
            clearInterval(countdownInterval);
            countdownInterval = null;

            try {
                const res = await fetch('/api/meditation/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ duration: selectedDuration })
                });

                const data = await res.json();

                if (res.ok) {
                    document.getElementById('messageText').innerText = '今日靜心圓滿，願你身心輕安';
                    setTimeout(() => {
                        alert(`靜心圓滿！\n時長：${data.minutes_added}分鐘\n靜心值：+${data.points_added}`);
                        resetMeditation();
                    }, 1000);
                } else {
                    alert(data.error || '靜心記錄失敗');
                    resetMeditation();
                }
            } catch (error) {
                console.error('完成靜心錯誤:', error);
                alert('網路異常，請稍後再試');
                resetMeditation();
            }
        }

        function resetMeditation() {
            document.getElementById('durationSelector').style.display = 'flex';
            document.getElementById('breathingLight').classList.remove('active');
            document.getElementById('countdownDisplay').classList.remove('active');
            document.getElementById('messageText').innerText = '深呼吸，放下雜念，靜享片刻安寧';
            document.getElementById('startBtn').style.display = 'block';
            document.getElementById('startBtn').disabled = true;
            document.getElementById('endBtn').style.display = 'none';
            
            document.querySelectorAll('.duration-option').forEach(b => b.classList.remove('selected'));
            selectedDuration = null;
            remainingSeconds = 0;
        }
    </script>
</body>
</html>
