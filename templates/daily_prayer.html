<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>每日祈願 | Daily Prayer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .prayer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .prayer-button {
            background: transparent;
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
            font-size: 1.5rem;
            padding: 15px 50px;
            cursor: pointer;
            letter-spacing: 10px;
            transition: all 0.3s ease;
            animation: buttonBreath 3s ease-in-out infinite;
        }

        .prayer-button:hover:not(:disabled) {
            background: #FFFFFF;
            color: #000000;
            box-shadow: 0 0 30px rgba(255,255,255,0.6);
        }

        .prayer-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes buttonBreath {
            0%, 100% {
                box-shadow: 0 0 10px rgba(255,255,255,0.3);
            }
            50% {
                box-shadow: 0 0 25px rgba(255,255,255,0.6);
            }
        }

        /* 莲花动画 */
        .lotus-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            display: none;
            z-index: 1000;
        }

        .lotus-petal {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50% 50% 0 50%;
            transform-origin: bottom right;
            opacity: 0;
        }

        .lotus-animation.active .lotus-petal {
            animation: lotusBloom 4s ease-in-out forwards;
        }

        .lotus-petal:nth-child(1) { transform: rotate(0deg); animation-delay: 0s; }
        .lotus-petal:nth-child(2) { transform: rotate(45deg); animation-delay: 0.2s; }
        .lotus-petal:nth-child(3) { transform: rotate(90deg); animation-delay: 0.4s; }
        .lotus-petal:nth-child(4) { transform: rotate(135deg); animation-delay: 0.6s; }
        .lotus-petal:nth-child(5) { transform: rotate(180deg); animation-delay: 0.8s; }
        .lotus-petal:nth-child(6) { transform: rotate(225deg); animation-delay: 1s; }
        .lotus-petal:nth-child(7) { transform: rotate(270deg); animation-delay: 1.2s; }
        .lotus-petal:nth-child(8) { transform: rotate(315deg); animation-delay: 1.4s; }

        @keyframes lotusBloom {
            0% {
                opacity: 0;
                transform: scale(0) rotate(var(--rotation, 0deg));
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(var(--rotation, 0deg));
            }
            100% {
                opacity: 0;
                transform: scale(1.5) rotate(var(--rotation, 0deg));
            }
        }

        .prayer-result {
            margin-top: 40px;
            padding: 30px 50px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.05);
            max-width: 600px;
            text-align: center;
            font-size: 1.3rem;
            line-height: 2;
            letter-spacing: 3px;
            display: none;
            animation: fadeIn 1s ease-in;
        }

        .prayer-result.show {
            display: block;
        }

        .nav-links {
            margin-top: 60px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-link {
            color: #AAAAAA;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid #444;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        .nav-link:hover {
            color: #FFFFFF;
            border-color: #FFFFFF;
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .page-title {
            letter-spacing: 10px;
            font-size: 2rem;
            margin-bottom: 10px;
            animation: shrineTitleBreath 4s ease-in-out infinite;
        }

        .page-subtitle {
            color: #666;
            margin-bottom: 50px;
            letter-spacing: 5px;
        }

        @keyframes shrineTitleBreath {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255,255,255,0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(255,255,255,0.9),
                             0 0 40px rgba(255,255,255,0.5);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="prayer-container">
        <h2 class="page-title">每日祈願</h2>
        <p class="page-subtitle">DAILY PRAYER</p>

        <button id="prayerBtn" class="prayer-button">開始祈願</button>

        <div id="prayerResult" class="prayer-result"></div>

        <!-- 莲花动画容器 -->
        <div id="lotusAnimation" class="lotus-animation">
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
            <div class="lotus-petal"></div>
        </div>

        <div class="nav-links">
            <a href="/daily-checkin" class="nav-link">每日簽到</a>
            <a href="/meditation" class="nav-link">靜心儀式</a>
            <a href="/profile" class="nav-link">用戶中心</a>
            <a href="/shrine" class="nav-link">返回神宮</a>
        </div>
    </div>

    <script>
        document.getElementById('prayerBtn').addEventListener('click', async function() {
            const btn = this;
            const resultDiv = document.getElementById('prayerResult');
            const lotusAnim = document.getElementById('lotusAnimation');

            btn.disabled = true;
            btn.innerText = '祈 願 中...';

            try {
                const res = await fetch('/api/prayer/draw', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || '祈願失敗，請稍後再試');
                    btn.disabled = false;
                    btn.innerText = '開始祈願';
                    return;
                }

                // 显示莲花动画
                lotusAnim.style.display = 'block';
                lotusAnim.classList.add('active');

                // 4秒后显示结果
                setTimeout(() => {
                    lotusAnim.style.display = 'none';
                    lotusAnim.classList.remove('active');
                    
                    resultDiv.innerText = data.content;
                    resultDiv.classList.add('show');
                    
                    btn.innerText = '今日祈願已完成';
                }, 4000);

            } catch (error) {
                console.error('祈願錯誤:', error);
                alert('網路異常，請稍後再試');
                btn.disabled = false;
                btn.innerText = '開始祈願';
            }
        });
    </script>
</body>
</html>
