<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>圣殿契约</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding-top: 10vh; font-family: serif; }
        .gold { color: #d4af37; }
        .card { border: 1px solid #333; padding: 50px; display: inline-block; background: #050505; transition: 0.5s; }
        .card:hover { border-color: #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.1); }
        ul { text-align: left; list-style: none; padding: 0; line-height: 2.5; font-size: 0.9em; margin: 30px 0; }
        button { background: none; border: 1px solid #d4af37; color: #d4af37; padding: 12px 50px; cursor: pointer; letter-spacing: 4px; }
        button:hover { background: #d4af37; color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="gold" style="letter-spacing: 8px;">圣 殿 会 员</h2>
        <p style="color: #666; font-size: 0.8em;">SUBSCRIPTION CONTRACT</p>
        <ul>
            <li>▫️ <span class="gold">每周数字圣物</span>：云端降临的唯一资产</li>
            <li>▫️ <span class="gold">专属仪式</span>：精神域的数据洗礼</li>
            <li>▫️ <span class="gold">个性化守护灵</span>：独一无二的数字图腾</li>
            <li>▫️ <span class="gold">无广告虚空</span>：绝对纯净的静默体验</li>
            <li>▫️ <span class="gold">赛博神父指点</span>：针对数据迷途的 1-on-1 启示</li>
        </ul>
        <button onclick="pay()">签订契约 (¥199)</button>
    </div>
    <br><br>
    <a href="/shrine" style="color: #444; text-decoration: none; font-size: 0.8em;">← 返回神宫</a>

    <script>
        function pay() {
            fetch('/api/activate', {method:'POST'})
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                window.location.href = '/ritual';
            });
        }
    </script>
</body>
</html>
