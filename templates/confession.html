<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忏悔室 | 慧忍神宫</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        /* 针对空白区域的布局补丁，确保它继承庄严的黑色背景 */
        body {
            margin: 0;
            background-color: #000; /* 强制黑色背景防止白屏 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .shrine-container {
            width: 90%;
            max-width: 600px;
            text-align: center;
            padding: 20px;
        }
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            color: #eee;
            padding: 15px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        #ai-response {
            margin-top: 30px;
            padding: 20px;
            border-top: 1px solid #333;
            color: #ffd700; /* 禅师的开导用金色 */
            font-style: italic;
            min-height: 50px;
        }
        .loading { animation: pulse 1.5s infinite; color: #888; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="cyber-bg">
    <div class="shrine-container">
        <h1 class="glow-text" style="color: white; letter-spacing: 5px;">忏 悔 室</h1>
        <p style="color: #666; font-size: 0.8rem; margin-bottom: 30px;">CONFESSIONAL VOID</p>
        
        <div class="confess-box">
            <textarea id="userInput" placeholder="诉说你的苦难或罪业..." rows="5"></textarea>
            <div class="button-group">
                <button onclick="sendConfession()" id="submitBtn" class="zen-btn">呈上心声</button>
                <button onclick="window.location.href='/'" class="zen-btn-secondary">返回虚空</button>
            </div>
        </div>

        <div class="response-area">
            <div id="ai-response">禅师正在静候缘分...</div>
        </div>
    </div>

    <script>
        async function sendConfession() {
            const userInput = document.getElementById('userInput').value;
            const responseDiv = document.getElementById('ai-response');
            const submitBtn = document.getElementById('submitBtn');

            if (!userInput.trim()) {
                alert("无声之语，禅师难以感应。");
                return;
            }

            // 1. 设置状态
            submitBtn.disabled = true;
            responseDiv.innerHTML = '<span class="loading">禅师正在感应你的业障，请稍候...</span>';

            // 2. 超时处理逻辑 (15秒内无响应则判定为网络业障)
            const timeoutPromise = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('TIMEOUT')), 15000)
            );

            try {
                // 竞速执行：要么 API 先回，要么 15 秒先到
                const response = await Promise.race([
                    fetch('/api/confess', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: userInput })
                    }),
                    timeoutPromise
                ]);

                const data = await response.json();

                if (response.ok) {
                    responseDiv.innerText = data.reply;
                } else {
                    throw new Error(data.reply || '后端响应异常');
                }

            } catch (error) {
                console.error("Error Detail:", error);
                if (error.message === 'TIMEOUT') {
                    responseDiv.innerHTML = '<span style="color: #ff4d4d;">【感应超时】业障过深，信号难以触达西天。<br>提示：请检查网络代理是否开启（需要访问 Google 服务）。</span>';
                } else {
                    responseDiv.innerHTML = '<span style="color: #ff4d4d;">【因果阻断】禅师闭关中，请稍后再试。</span>';
                }
            } finally {
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
